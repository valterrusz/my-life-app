<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Life App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root, [data-theme="light"] {
  --color-bg: #f7f6f2;
  --color-surface: #f9f8f5;
  --color-surface-2: #fbfbf9;
  --color-surface-offset: #f0ede8;
  --color-surface-dynamic: #e6e4df;
  --color-border: #d4d1ca;
  --color-divider: #dcd9d5;
  --color-text: #28251d;
  --color-text-muted: #7a7974;
  --color-text-faint: #bab9b4;
  --color-primary: #01696f;
  --color-primary-hover: #0c4e54;
  --color-primary-highlight: #cedcd8;
  --color-success: #437a22;
  --color-success-hover: #2e5c10;
  --color-success-highlight: #d4dfcc;
  --color-warning: #964219;
  --color-warning-highlight: #ddcfc6;
  --color-error: #a12c7b;
  --radius-sm: 0.375rem; --radius-md: 0.5rem; --radius-lg: 0.75rem;
  --radius-xl: 1rem; --radius-full: 9999px;
  --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --space-12:3rem;--space-16:4rem;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
  --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
  --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --font-body:'DM Sans',system-ui,sans-serif;
  --font-mono:'DM Mono',monospace;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
  --sidebar-w: 220px;
}
[data-theme="dark"] {
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#22211f;--color-surface-dynamic:#2d2c2a;
  --color-border:#393836;--color-divider:#262523;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-highlight:#313b3b;
  --color-success:#6daa45;--color-success-hover:#4d8f25;--color-success-highlight:#3a4435;
  --color-warning:#bb653b;--color-warning-highlight:#564942;--color-error:#d163a7;
  --shadow-sm:0 1px 2px oklch(0 0 0/.2);--shadow-md:0 4px 12px oklch(0 0 0/.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition),color var(--transition);overflow-x:hidden}
img,svg{display:block;max-width:100%}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
input{font:inherit;color:inherit}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:0.01ms!important;animation-duration:0.01ms!important}}

/* === APP SHELL === */
.app-shell { display: flex; min-height: 100dvh; }

/* === SIDEBAR === */
.sidebar {
  width: var(--sidebar-w);
  background: var(--color-surface);
  border-right: 1px solid var(--color-divider);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform var(--transition), background var(--transition);
}
.sidebar-logo {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-5) var(--space-5) var(--space-4);
  border-bottom: 1px solid var(--color-divider);
}
.sidebar-logo-text { font-size: var(--text-base); font-weight: 700; letter-spacing: -0.02em; }
.sidebar-logo-text span { color: var(--color-primary); }
.sidebar-nav { flex: 1; padding: var(--space-3) var(--space-2); display: flex; flex-direction: column; gap: var(--space-1); }
.nav-item {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-2) var(--space-3); border-radius: var(--radius-lg);
  font-size: var(--text-sm); font-weight: 500; color: var(--color-text-muted);
  transition: background var(--transition), color var(--transition);
  cursor: pointer; text-align: left; width: 100%;
}
.nav-item:hover { background: var(--color-surface-offset); color: var(--color-text); }
.nav-item.active { background: var(--color-primary-highlight); color: var(--color-primary); }
.nav-item svg { flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }
.sidebar-footer { padding: var(--space-3) var(--space-2) var(--space-4); border-top: 1px solid var(--color-divider); }

/* === MAIN === */
.main-content {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100dvh;
}
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--space-4) var(--space-8);
  border-bottom: 1px solid var(--color-divider);
  background: var(--color-surface);
  position: sticky; top: 0; z-index: 50;
}
.topbar-title { font-size: var(--text-base); font-weight: 600; }
.topbar-right { display: flex; align-items: center; gap: var(--space-3); }
.theme-toggle {
  width: 36px; height: 36px; border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  transition: background var(--transition), color var(--transition);
}
.theme-toggle:hover { background: var(--color-surface-offset); color: var(--color-text); }

.page { display: none; padding: var(--space-8); max-width: 720px; }
.page.active { display: block; }

/* === CHORE PAGE === */
.today-card {
  background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.08);
  border-radius: var(--radius-xl); padding: var(--space-6); margin-bottom: var(--space-6);
  box-shadow: var(--shadow-md);
}
.today-label { font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-text-faint); margin-bottom: var(--space-2); }
.today-task-row { display: flex; align-items: center; gap: var(--space-4); flex-wrap: wrap; }
.today-task-name { font-size: var(--text-lg); font-weight: 600; flex: 1; }
.today-task-name.done { text-decoration: line-through; color: var(--color-text-muted); }
.duration-badge { font-size: var(--text-xs); font-family: var(--font-mono); background: var(--color-surface-offset); color: var(--color-text-muted); padding: var(--space-1) var(--space-2); border-radius: var(--radius-full); white-space: nowrap; }
.done-btn { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-sm); font-weight: 500; padding: var(--space-2) var(--space-4); border-radius: var(--radius-full); background: var(--color-primary); color: white; transition: background var(--transition), transform var(--transition); }
.done-btn:hover { background: var(--color-primary-hover); }
.done-btn:active { transform: scale(0.97); }
.done-btn.completed { background: var(--color-success); }
.done-btn.completed:hover { background: var(--color-success-hover); }
.skip-btn { font-size: var(--text-xs); color: var(--color-text-faint); margin-top: var(--space-3); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; transition: color var(--transition); background: none; border: none; }
.skip-btn:hover { color: var(--color-text-muted); }

.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: var(--space-3); margin-bottom: var(--space-6); }
.stat-card { background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.07); border-radius: var(--radius-lg); padding: var(--space-4); text-align: center; box-shadow: var(--shadow-sm); }
.stat-value { font-size: var(--text-xl); font-weight: 700; font-family: var(--font-mono); color: var(--color-primary); line-height: 1.1; }
.stat-label { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1); }

.week-strip { display: flex; gap: var(--space-2); margin-bottom: var(--space-6); }
.day-dot { display: flex; flex-direction: column; align-items: center; gap: var(--space-1); }
.day-dot-label { font-size: var(--text-xs); color: var(--color-text-faint); }
.day-dot-circle { width: 28px; height: 28px; border-radius: var(--radius-full); background: var(--color-surface-offset); display: flex; align-items: center; justify-content: center; font-size: 11px; }
.day-dot-circle.done { background: var(--color-success-highlight); color: var(--color-success); }
.day-dot-circle.today-ring { border: 2px solid var(--color-primary); }
.day-dot-circle.skipped { background: var(--color-warning-highlight); color: var(--color-warning); }

.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-3); }
.section-title { font-size: var(--text-sm); font-weight: 600; color: var(--color-text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
.add-task-btn { display: flex; align-items: center; gap: var(--space-1); font-size: var(--text-sm); font-weight: 500; color: var(--color-primary); transition: color var(--transition); }
.add-task-btn:hover { color: var(--color-primary-hover); }
.task-list { display: flex; flex-direction: column; gap: var(--space-2); }
.task-item { background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.07); border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4); display: flex; align-items: center; gap: var(--space-3); box-shadow: var(--shadow-sm); transition: box-shadow var(--transition); }
.task-item:hover { box-shadow: var(--shadow-md); }
.task-item.next-up { border-color: oklch(from var(--color-primary) l c h / 0.3); }
.task-info { flex: 1; }
.task-name { font-size: var(--text-sm); font-weight: 500; }
.task-duration { font-size: var(--text-xs); font-family: var(--font-mono); color: var(--color-text-muted); margin-top: 2px; }
.task-actions { display: flex; gap: var(--space-1); }
.icon-btn { width: 30px; height: 30px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; color: var(--color-text-faint); transition: background var(--transition), color var(--transition); }
.icon-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }
.icon-btn.delete:hover { background: #fee2e2; color: #dc2626; }
[data-theme="dark"] .icon-btn.delete:hover { background: #3d1515; color: #f87171; }
.next-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: var(--color-primary); background: var(--color-primary-highlight); padding: 2px var(--space-2); border-radius: var(--radius-full); }

.add-form { background: var(--color-surface-2); border: 1.5px dashed var(--color-border); border-radius: var(--radius-lg); padding: var(--space-4); margin-top: var(--space-2); display: none; }
.add-form.open { display: block; }
.form-row { display: flex; gap: var(--space-3); flex-wrap: wrap; }
.form-group { display: flex; flex-direction: column; gap: var(--space-1); flex: 1; min-width: 140px; }
.form-group label { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
.form-input { font-size: var(--text-sm); padding: var(--space-2) var(--space-3); border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface); color: var(--color-text); transition: border-color var(--transition), box-shadow var(--transition); }
.form-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15); }
.form-actions { display: flex; gap: var(--space-2); margin-top: var(--space-3); justify-content: flex-end; }
.btn-primary { font-size: var(--text-sm); font-weight: 500; padding: var(--space-2) var(--space-4); border-radius: var(--radius-full); background: var(--color-primary); color: white; transition: background var(--transition); }
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-ghost { font-size: var(--text-sm); padding: var(--space-2) var(--space-3); border-radius: var(--radius-full); color: var(--color-text-muted); transition: background var(--transition), color var(--transition); }
.btn-ghost:hover { background: var(--color-surface-offset); color: var(--color-text); }

.history-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) 0; border-bottom: 1px solid var(--color-divider); }
.history-item:last-child { border-bottom: none; }
.history-date { font-size: var(--text-xs); font-family: var(--font-mono); color: var(--color-text-faint); min-width: 60px; }
.history-name { font-size: var(--text-sm); flex: 1; }
.history-status { font-size: var(--text-xs); font-weight: 600; padding: 2px var(--space-2); border-radius: var(--radius-full); }
.history-status.done { background: var(--color-success-highlight); color: var(--color-success); }
.history-status.skipped { background: var(--color-warning-highlight); color: var(--color-warning); }

/* === WEIGHT PAGE === */
.weight-input-card {
  background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.08);
  border-radius: var(--radius-xl); padding: var(--space-6); margin-bottom: var(--space-6);
  box-shadow: var(--shadow-md); display: flex; align-items: flex-end; gap: var(--space-4); flex-wrap: wrap;
}
.weight-input-group { display: flex; flex-direction: column; gap: var(--space-1); }
.weight-input-group label { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); letter-spacing: 0.05em; text-transform: uppercase; }
.weight-number-input {
  font-size: var(--text-xl); font-weight: 700; font-family: var(--font-mono);
  width: 130px; padding: var(--space-2) var(--space-3);
  border: 1px solid var(--color-border); border-radius: var(--radius-lg);
  background: var(--color-surface-2); color: var(--color-text);
  transition: border-color var(--transition), box-shadow var(--transition);
  font-variant-numeric: tabular-nums;
}
.weight-number-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15); }
.unit-toggle { display: flex; border: 1px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden; }
.unit-btn { font-size: var(--text-xs); font-weight: 600; padding: var(--space-2) var(--space-3); color: var(--color-text-muted); transition: background var(--transition), color var(--transition); }
.unit-btn.active { background: var(--color-primary); color: white; }
.log-btn { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-sm); font-weight: 500; padding: var(--space-3) var(--space-5); border-radius: var(--radius-full); background: var(--color-primary); color: white; transition: background var(--transition), transform var(--transition); white-space: nowrap; }
.log-btn:hover { background: var(--color-primary-hover); }
.log-btn:active { transform: scale(0.97); }

.weight-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: var(--space-3); margin-bottom: var(--space-6); }
@media(max-width:600px){.weight-stats{grid-template-columns:repeat(2,1fr)}}

.chart-card {
  background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.07);
  border-radius: var(--radius-xl); padding: var(--space-6); box-shadow: var(--shadow-sm);
  margin-bottom: var(--space-6);
}
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4); flex-wrap: wrap; gap: var(--space-2); }
.chart-title { font-size: var(--text-base); font-weight: 600; }
.range-tabs { display: flex; gap: var(--space-1); }
.range-tab { font-size: var(--text-xs); font-weight: 600; padding: var(--space-1) var(--space-3); border-radius: var(--radius-full); color: var(--color-text-muted); transition: background var(--transition), color var(--transition); }
.range-tab.active { background: var(--color-primary-highlight); color: var(--color-primary); }
.chart-wrap { position: relative; height: 240px; }

.weight-log-list { display: flex; flex-direction: column; gap: 0; }
.weight-log-item { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) 0; border-bottom: 1px solid var(--color-divider); }
.weight-log-item:last-child { border-bottom: none; }
.wlog-date { font-size: var(--text-xs); font-family: var(--font-mono); color: var(--color-text-faint); min-width: 70px; }
.wlog-val { font-size: var(--text-base); font-weight: 600; font-family: var(--font-mono); font-variant-numeric: tabular-nums; flex: 1; }
.wlog-delta { font-size: var(--text-xs); font-family: var(--font-mono); padding: 2px var(--space-2); border-radius: var(--radius-full); }
.wlog-delta.up { background: #fee2e2; color: #dc2626; }
.wlog-delta.down { background: var(--color-success-highlight); color: var(--color-success); }
.wlog-delta.same { color: var(--color-text-faint); }
[data-theme="dark"] .wlog-delta.up { background: #3d1515; color: #f87171; }

.empty-state { text-align: center; padding: var(--space-10) var(--space-8); color: var(--color-text-muted); }
.empty-state svg { margin: 0 auto var(--space-4); color: var(--color-text-faint); }
.empty-state p { font-size: var(--text-sm); max-width: 28ch; margin: 0 auto; }



/* === SHOPPING LIST === */
.shopping-section { margin-top: var(--space-8); }
.shop-list { display: flex; flex-direction: column; gap: var(--space-2); margin-bottom: var(--space-4); }
.shop-item { display: flex; align-items: center; gap: var(--space-3); background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.07); border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4); box-shadow: var(--shadow-sm); transition: opacity var(--transition); }
.shop-item.checked { opacity: 0.45; }
.shop-checkbox { width: 20px; height: 20px; border-radius: var(--radius-sm); border: 2px solid var(--color-border); background: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; transition: background var(--transition), border-color var(--transition); }
.shop-checkbox.checked { background: var(--color-success); border-color: var(--color-success); }
.shop-label { flex: 1; font-size: var(--text-sm); transition: text-decoration var(--transition); }
.shop-item.checked .shop-label { text-decoration: line-through; color: var(--color-text-muted); }
.shop-source { font-size: 10px; font-family: var(--font-mono); color: var(--color-text-faint); background: var(--color-surface-offset); padding: 1px var(--space-2); border-radius: var(--radius-full); white-space: nowrap; }
.shop-add-row { display: flex; gap: var(--space-2); margin-top: var(--space-2); }
.shop-add-input { flex: 1; font-size: var(--text-sm); padding: var(--space-2) var(--space-3); border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface); color: var(--color-text); transition: border-color var(--transition), box-shadow var(--transition); }
.shop-add-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15); }
.shop-add-btn { font-size: var(--text-sm); font-weight: 500; padding: var(--space-2) var(--space-4); border-radius: var(--radius-md); background: var(--color-primary); color: white; transition: background var(--transition); white-space: nowrap; flex-shrink: 0; }
.shop-add-btn:hover { background: var(--color-primary-hover); }
.shop-actions-row { display: flex; gap: var(--space-3); margin-top: var(--space-3); flex-wrap: wrap; }
.shop-clear-btn { font-size: var(--text-xs); color: var(--color-text-faint); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; transition: color var(--transition); background: none; border: none; }
.shop-clear-btn:hover { color: var(--color-error); }
.shop-group-label { font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--color-text-faint); margin: var(--space-4) 0 var(--space-2); }
.shop-progress { height: 4px; background: var(--color-surface-offset); border-radius: var(--radius-full); margin-bottom: var(--space-4); overflow: hidden; }
.shop-progress-bar { height: 100%; background: var(--color-success); border-radius: var(--radius-full); transition: width 0.4s ease; }

/* === MEAL PLAN === */
.meal-table-wrap { overflow-x: auto; border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); border: 1px solid oklch(from var(--color-text) l c h / 0.07); margin-bottom: var(--space-6); }
.meal-table { width: 100%; border-collapse: collapse; background: var(--color-surface); font-size: var(--text-sm); }
.meal-table th { background: var(--color-surface-offset); font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--color-text-muted); padding: var(--space-3) var(--space-4); text-align: left; border-bottom: 1px solid var(--color-divider); white-space: nowrap; }
.meal-table th:first-child { width: 80px; }
.meal-table td { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-divider); vertical-align: top; color: var(--color-text); line-height: 1.5; }
.meal-table tr:last-child td { border-bottom: none; }
.meal-table tr:hover td { background: var(--color-surface-offset); transition: background var(--transition); }
.meal-table td:first-child { font-size: var(--text-xs); font-weight: 700; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
.meal-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 1px var(--space-2); border-radius: var(--radius-full); background: var(--color-primary-highlight); color: var(--color-primary); margin-right: var(--space-1); }
.meal-empty-cell { color: var(--color-text-faint); font-style: italic; font-size: var(--text-xs); }
.import-zone { border: 2px dashed var(--color-border); border-radius: var(--radius-xl); padding: var(--space-10) var(--space-8); text-align: center; cursor: pointer; transition: border-color var(--transition), background var(--transition); background: var(--color-surface); margin-bottom: var(--space-6); }
.import-zone:hover, .import-zone.drag-over { border-color: var(--color-primary); background: var(--color-primary-highlight); }
.import-zone svg { margin: 0 auto var(--space-3); color: var(--color-text-faint); }
.import-zone p { font-size: var(--text-sm); color: var(--color-text-muted); }
.import-zone strong { color: var(--color-primary); }
.import-zone small { font-size: var(--text-xs); color: var(--color-text-faint); display: block; margin-top: var(--space-1); }
.week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-4); }
.week-label { font-size: var(--text-sm); font-weight: 600; font-family: var(--font-mono); color: var(--color-text-muted); }
.week-arrows { display: flex; gap: var(--space-1); }
.week-arrow { width: 32px; height: 32px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; color: var(--color-text-muted); transition: background var(--transition), color var(--transition); }
.week-arrow:hover { background: var(--color-surface-offset); color: var(--color-text); }
.week-arrow:disabled { opacity: 0.3; cursor: default; }
.csv-template-btn { font-size: var(--text-xs); color: var(--color-text-faint); text-decoration: underline; text-underline-offset: 3px; cursor: pointer; transition: color var(--transition); background: none; border: none; margin-top: var(--space-2); display: inline-block; }
.csv-template-btn:hover { color: var(--color-text-muted); }
.meal-import-error { font-size: var(--text-xs); color: var(--color-error); margin-top: var(--space-2); min-height: 1.2em; }
.meal-week-tab { display: flex; align-items: center; gap: var(--space-2); padding: var(--space-2) var(--space-3); border-radius: var(--radius-lg); background: var(--color-surface); border: 1px solid oklch(from var(--color-text) l c h / 0.07); font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); cursor: pointer; transition: all var(--transition); }
.meal-week-tab.active { background: var(--color-primary-highlight); color: var(--color-primary); border-color: oklch(from var(--color-primary) l c h / 0.2); }
.week-tabs-row { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-bottom: var(--space-4); }
.delete-week-btn { font-size: 10px; color: var(--color-text-faint); background: none; border: none; cursor: pointer; padding: 0 0 0 var(--space-1); line-height: 1; transition: color var(--transition); }
.delete-week-btn:hover { color: var(--color-error); }

/* === MOBILE === */
.mobile-topbar { display: none; align-items: center; justify-content: space-between; padding: var(--space-3) var(--space-4); background: var(--color-surface); border-bottom: 1px solid var(--color-divider); position: sticky; top: 0; z-index: 200; }
.hamburger { width: 36px; height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; border-radius: var(--radius-md); transition: background var(--transition); }
.hamburger:hover { background: var(--color-surface-offset); }
.hamburger span { display: block; width: 18px; height: 2px; background: var(--color-text); border-radius: 2px; transition: transform var(--transition), opacity var(--transition); }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: oklch(0.1 0 0 / 0.4); z-index: 99; }

@media(max-width:768px){
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .sidebar-overlay.open { display: block; }
  .main-content { margin-left: 0; }
  .topbar { display: none; }
  .mobile-topbar { display: flex; }
  .page { padding: var(--space-4); }
  .stats-row { grid-template-columns: repeat(3,1fr); }
}
</style>
</head>
<body>
<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none" aria-label="My Life App logo">
        <rect width="28" height="28" rx="7" fill="currentColor" opacity="0.12"/>
        <circle cx="10" cy="10" r="3" fill="currentColor" opacity="0.7"/>
        <circle cx="18" cy="10" r="3" fill="currentColor" opacity="0.4"/>
        <circle cx="10" cy="18" r="3" fill="currentColor" opacity="0.4"/>
        <circle cx="18" cy="18" r="3" fill="currentColor"/>
      </svg>
      <span class="sidebar-logo-text">my<span>life</span></span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-page="chores">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12l3 3 5-5"/></svg>
        Daily Chore
      </button>
      <button class="nav-item" data-page="weight">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/><circle cx="8" cy="12" r="2" fill="currentColor" stroke="none"/></svg>
        Weight
      </button>
      <div style="margin: var(--space-2) var(--space-3) var(--space-1); font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--color-text-faint);">Meals</div>
      <button class="nav-item" data-page="meal-plan">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18"/><path d="M9 5v14"/></svg>
        Meal Plan
      </button>
      <button class="nav-item" data-page="shopping">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Shopping List
      </button>
      <button class="nav-item" data-page="import">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Import CSV
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" data-theme-toggle aria-label="Toggle dark mode" style="width:100%">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span id="themeLabel">Dark mode</span>
      </button>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- MAIN -->
  <div class="main-content">
    <!-- Desktop topbar -->
    <div class="topbar">
      <span class="topbar-title" id="topbarTitle">Daily Chore</span>
    </div>
    <!-- Mobile topbar -->
    <div class="mobile-topbar">
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <span style="font-size:var(--text-sm);font-weight:600" id="mobileTitle">Daily Chore</span>
      <div style="width:36px"></div>
    </div>

    <!-- CHORES PAGE -->
    <section class="page active" id="page-chores">
      <div class="week-strip" id="weekStrip"></div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-value" id="streakCount">0</div><div class="stat-label">🔥 streak</div></div>
        <div class="stat-card"><div class="stat-value" id="totalDone">0</div><div class="stat-label">✅ done</div></div>
        <div class="stat-card"><div class="stat-value" id="totalTasks">0</div><div class="stat-label">📋 tasks</div></div>
      </div>
      <div id="todaySection"></div>
      <div class="section-header" style="margin-top:var(--space-8)">
        <span class="section-title">All Chores</span>
        <button class="add-task-btn" id="toggleAddForm">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Add chore
        </button>
      </div>
      <div class="add-form" id="addForm">
        <div class="form-row">
          <div class="form-group" style="flex:2">
            <label for="taskNameInput">Chore name</label>
            <input class="form-input" type="text" id="taskNameInput" placeholder="e.g. Wipe down kitchen counter" maxlength="60">
          </div>
          <div class="form-group" style="flex:1;min-width:100px">
            <label for="taskDurInput">Duration</label>
            <input class="form-input" type="text" id="taskDurInput" placeholder="e.g. 5 min" maxlength="12">
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-ghost" id="cancelAddForm">Cancel</button>
          <button class="btn-primary" id="submitAddForm">Add chore</button>
        </div>
      </div>
      <div class="task-list" id="taskList"></div>
      <div style="margin-top:var(--space-8)">
        <div class="section-header"><span class="section-title">History</span></div>
        <div id="historyList"></div>
      </div>
    </section>

    <!-- WEIGHT PAGE -->
    <section class="page" id="page-weight">
      <div class="weight-input-card">
        <div class="weight-input-group">
          <label for="weightInput">Today's weight</label>
          <input class="weight-number-input" type="number" id="weightInput" placeholder="70.0" step="0.1" min="20" max="300">
        </div>
        <div class="weight-input-group">
          <label>Unit</label>
          <div class="unit-toggle">
            <button class="unit-btn active" data-unit="kg">kg</button>
            <button class="unit-btn" data-unit="lbs">lbs</button>
          </div>
        </div>
        <div class="weight-input-group">
          <label for="weightDateInput">Date</label>
          <input class="form-input" type="date" id="weightDateInput" style="font-size:var(--text-sm)">
        </div>
        <button class="log-btn" id="logWeightBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          Log weight
        </button>
      </div>

      <div class="weight-stats">
        <div class="stat-card"><div class="stat-value" id="wLatest">—</div><div class="stat-label">Latest</div></div>
        <div class="stat-card"><div class="stat-value" id="wLowest">—</div><div class="stat-label">Lowest</div></div>
        <div class="stat-card"><div class="stat-value" id="wHighest">—</div><div class="stat-label">Highest</div></div>
        <div class="stat-card"><div class="stat-value" id="wChange">—</div><div class="stat-label">30d change</div></div>
      </div>

      <div class="chart-card">
        <div class="chart-header">
          <span class="chart-title">Weight over time</span>
          <div class="range-tabs">
            <button class="range-tab active" data-range="30">30d</button>
            <button class="range-tab" data-range="90">90d</button>
            <button class="range-tab" data-range="365">1y</button>
            <button class="range-tab" data-range="0">All</button>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="weightChart"></canvas></div>
      </div>

      <div class="section-header"><span class="section-title">Log</span></div>
      <div id="weightLogList"></div>
    </section>

    <!-- MEAL PLAN PAGE -->
    <section class="page" id="page-meal-plan">
      <div id="mealWeekTabs"></div>
      <div id="mealPlanContent"></div>
    </section>

    <!-- SHOPPING LIST PAGE -->
    <section class="page" id="page-shopping">
      <div id="shoppingWeekTabs"></div>
      <div class="shopping-section" id="shoppingSection">
        <div class="section-header">
          <span class="section-title">Shopping List</span>
          <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;align-items:center">
            <button class="shop-clear-btn" id="selectAllShop">Select all</button>
            <button class="shop-clear-btn" id="deselectAllShop">Deselect all</button>
            <button class="shop-clear-btn" id="clearChecked">Clear checked</button>
            <button class="shop-clear-btn" id="deleteChecked" style="color:var(--color-error)">Delete selected</button>
          </div>
        </div>
        <div class="shop-progress"><div class="shop-progress-bar" id="shopProgressBar" style="width:0%"></div></div>
        <div class="shop-list" id="shopList"></div>
        <div class="shop-group-label">Add item manually</div>
        <div class="shop-add-row">
          <input class="shop-add-input" type="text" id="shopAddInput" placeholder="e.g. Olive oil, 1 bottle" maxlength="80">
          <button class="shop-add-btn" id="shopAddBtn">Add</button>
        </div>

      </div>
    </section>

    <!-- IMPORT CSV PAGE -->
    <section class="page" id="page-import">
      <div class="import-zone" id="importZone">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p>Drop your <strong>.csv</strong> file here, or <strong>click to browse</strong></p>
        <small>Columns: Day, Breakfast, Lunch, Dinner, Snack, Ingredients</small>
        <input type="file" id="csvFileInput" accept=".csv" style="display:none">
        <div class="meal-import-error" id="importError"></div>
      </div>
      <button class="csv-template-btn" id="downloadTemplate">⬇ Download CSV template</button>
      <div id="importHistory" style="margin-top:var(--space-8)"></div>
    </section>
  </div>
</div>

<script>
// ============================================================
// STATE & PERSISTENCE
// ============================================================
const DEFAULT_TASKS = [
  {id:1,name:"Vacuum one room",dur:"5–8 min"},
  {id:2,name:"Wipe down kitchen counter & stovetop",dur:"5 min"},
  {id:3,name:"Clean bathroom sink & mirror",dur:"5 min"},
  {id:4,name:"Take out trash",dur:"3 min"},
  {id:5,name:"Wipe down toilet",dur:"4 min"},
  {id:6,name:"Sweep/mop entryway",dur:"5 min"},
  {id:7,name:"Dust shelves or surfaces",dur:"7 min"},
  {id:8,name:"Clean microwave inside",dur:"5 min"},
  {id:9,name:"Scrub bathtub or shower tiles",dur:"10 min"},
  {id:10,name:"Wipe down fridge exterior & handles",dur:"3 min"},
  {id:11,name:"Wash up dishes / run dishwasher",dur:"8 min"},
  {id:12,name:"Mop kitchen floor",dur:"8 min"},
  {id:13,name:"Change bed sheets",dur:"10 min"},
  {id:14,name:"Declutter one drawer or shelf",dur:"10 min"},
  {id:15,name:"Clean windows / glass doors",dur:"8 min"},
  {id:16,name:"Wipe light switches & door handles",dur:"4 min"},
  {id:17,name:"Clean toilet bowl",dur:"5 min"},
  {id:18,name:"Organise under the sink",dur:"10 min"},
];

function loadState() {
  try { const s = localStorage.getItem("myLifeAppState"); if(s) return JSON.parse(s); } catch(e){}
  return null;
}
function saveState() {
  try { localStorage.setItem("myLifeAppState", JSON.stringify(state)); } catch(e){}
}

const _saved = loadState();
let state = _saved || {
  tasks: [...DEFAULT_TASKS],
  choreHistory: [],
  nextTaskId: DEFAULT_TASKS.length + 1,
  weightLog: [],    // [{date:"YYYY-MM-DD", value:70.5, unit:"kg"}]
  weightUnit: "kg",
};
if (!state.weightLog) state.weightLog = [];
if (!state.weightUnit) state.weightUnit = "kg";
if (state.tasks.length > 0) state.nextTaskId = Math.max(state.nextTaskId||0, ...state.tasks.map(t=>t.id)) + 1;

// ============================================================
// UTILS
// ============================================================
function todayStr() { return new Date().toISOString().slice(0,10); }
function getTodayEntry() { return state.choreHistory.find(h=>h.date===todayStr()); }
function getTodayTask() {
  const entry = getTodayEntry();
  if (entry) return state.tasks.find(t=>t.id===entry.taskId)||null;
  const recentIds = state.choreHistory.filter(h=>h.status==="done").sort((a,b)=>b.date.localeCompare(a.date)).map(h=>h.taskId);
  const available = state.tasks.filter(t=>!recentIds.slice(0,Math.min(state.tasks.length-1,recentIds.length)).includes(t.id));
  if (!available.length) return state.tasks[new Date().getDate()%state.tasks.length]||null;
  return available[new Date().getDate()%available.length];
}
function getStreak() {
  let s=0, d=new Date(); d.setHours(0,0,0,0);
  while(true){const ds=d.toISOString().slice(0,10);if(!state.choreHistory.find(h=>h.date===ds&&h.status==="done"))break;s++;d.setDate(d.getDate()-1);}
  return s;
}

// ============================================================
// CHORE RENDER
// ============================================================
function renderChores() {
  renderWeekStrip(); renderChoreStats(); renderToday(); renderTaskList(); renderChoreHistory();
}
function renderWeekStrip() {
  const strip=document.getElementById("weekStrip"); strip.innerHTML="";
  const days=["Su","Mo","Tu","We","Th","Fr","Sa"], today=new Date();
  for(let i=6;i>=0;i--){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const ds=d.toISOString().slice(0,10), entry=state.choreHistory.find(h=>h.date===ds), isToday=i===0;
    let cls="day-dot-circle", sym="";
    if(entry?.status==="done"){cls+=" done";sym="✓";}
    else if(entry?.status==="skipped"){cls+=" skipped";sym="–";}
    if(isToday)cls+=" today-ring";
    strip.innerHTML+=`<div class="day-dot"><div class="${cls}">${sym}</div><span class="day-dot-label">${days[d.getDay()]}</span></div>`;
  }
}
function renderChoreStats() {
  document.getElementById("streakCount").textContent=getStreak();
  document.getElementById("totalDone").textContent=state.choreHistory.filter(h=>h.status==="done").length;
  document.getElementById("totalTasks").textContent=state.tasks.length;
}
function renderToday() {
  const sec=document.getElementById("todaySection"), task=getTodayTask(), entry=getTodayEntry();
  const isDone=entry?.status==="done", isSkipped=entry?.status==="skipped";
  if(!task){sec.innerHTML=`<div style="background:var(--color-surface);border:1px dashed var(--color-border);border-radius:var(--radius-xl);padding:var(--space-8);text-align:center"><p style="font-size:var(--text-sm);color:var(--color-text-muted)">Add some chores below!</p></div>`;return;}
  sec.innerHTML=`<div class="today-card"><div class="today-label">Today's chore</div><div class="today-task-row"><span class="today-task-name${isDone?" done":""}">${task.name}</span><span class="duration-badge">${task.dur}</span><button class="done-btn${isDone?" completed":""}" id="doneBtn">${isDone?`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> Done!`:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> Mark done`}</button></div>${(!isDone&&!isSkipped)?`<button class="skip-btn" id="skipBtn">Skip today</button>`:""}${isSkipped?`<p style="font-size:var(--text-xs);color:var(--color-text-faint);margin-top:var(--space-3)">Skipped today — see you tomorrow!</p>`:""}</div>`;
  document.getElementById("doneBtn")?.addEventListener("click",()=>{if(isDone)return;markToday(task,"done");});
  document.getElementById("skipBtn")?.addEventListener("click",()=>markToday(task,"skipped"));
}
function markToday(task,status){
  const e=getTodayEntry();
  if(e)e.status=status; else state.choreHistory.push({date:todayStr(),taskId:task.id,taskName:task.name,status});
  saveState(); renderChores();
  if(status==="done"){const el=document.getElementById("streakCount");el.style.transform="scale(1.3)";el.style.color="var(--color-success)";setTimeout(()=>{el.style.transform="";el.style.color=""},400);}
}
function renderTaskList() {
  const list=document.getElementById("taskList"), next=getTodayTask();
  if(!state.tasks.length){list.innerHTML=`<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 12h8M8 8h5M8 16h3"/></svg><p>No chores yet.</p></div>`;return;}
  list.innerHTML=state.tasks.map(t=>{const isNext=next&&t.id===next.id&&!getTodayEntry();return`<div class="task-item${isNext?" next-up":""}"><div class="task-info"><div class="task-name">${t.name}</div><div class="task-duration">⏱ ${t.dur}</div></div>${isNext?`<span class="next-badge">Today</span>`:""}<div class="task-actions"><button class="icon-btn delete" data-del="${t.id}" aria-label="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button></div></div>`;}).join("");
  list.querySelectorAll("[data-del]").forEach(btn=>btn.addEventListener("click",()=>{state.tasks=state.tasks.filter(t=>t.id!==parseInt(btn.dataset.del));saveState();renderChores();}));
}
function renderChoreHistory() {
  const el=document.getElementById("historyList"), recent=[...state.choreHistory].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,14);
  if(!recent.length){el.innerHTML=`<p style="font-size:var(--text-sm);color:var(--color-text-faint);padding:var(--space-4) 0">No history yet.</p>`;return;}
  el.innerHTML=recent.map(h=>`<div class="history-item"><span class="history-date">${h.date.slice(5)}</span><span class="history-name">${h.taskName}</span><span class="history-status ${h.status}">${h.status==="done"?"Done":"Skipped"}</span></div>`).join("");
}

// ============================================================
// CHORE FORM
// ============================================================
document.getElementById("toggleAddForm").addEventListener("click",()=>document.getElementById("addForm").classList.toggle("open"));
document.getElementById("cancelAddForm").addEventListener("click",()=>{document.getElementById("addForm").classList.remove("open");document.getElementById("taskNameInput").value="";document.getElementById("taskDurInput").value="";});
document.getElementById("submitAddForm").addEventListener("click",()=>{
  const name=document.getElementById("taskNameInput").value.trim();
  const dur=document.getElementById("taskDurInput").value.trim()||"≤10 min";
  if(!name){document.getElementById("taskNameInput").focus();return;}
  state.tasks.push({id:state.nextTaskId++,name,dur});

let weightChart=null, activeRange=30;

function initWeightDate(){
  const inp=document.getElementById("weightDateInput");
  if(!inp.value) inp.value=todayStr();
}

function getWeightInUnit(val, fromUnit, toUnit) {
  if(fromUnit===toUnit) return val;
  if(fromUnit==="kg"&&toUnit==="lbs") return val*2.20462;
  if(fromUnit==="lbs"&&toUnit==="kg") return val/2.20462;
  return val;
}

function renderWeight() {
  initWeightDate();
  // Sync unit toggle
  document.querySelectorAll(".unit-btn").forEach(b=>{
    b.classList.toggle("active",b.dataset.unit===state.weightUnit);
  });
  renderWeightStats();
  renderWeightChart();
  renderWeightLog();
}

function renderWeightStats() {
  const log = state.weightLog;
  if(!log.length){["wLatest","wLowest","wHighest","wChange"].forEach(id=>document.getElementById(id).textContent="—");return;}
  const vals = log.map(e=>getWeightInUnit(e.value, e.unit, state.weightUnit));
  const latest = vals[vals.length-1];
  document.getElementById("wLatest").textContent = latest.toFixed(1);
  document.getElementById("wLowest").textContent = Math.min(...vals).toFixed(1);
  document.getElementById("wHighest").textContent = Math.max(...vals).toFixed(1);
  // 30d change
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate()-30);
  const old30 = log.filter(e=>new Date(e.date)<cutoff);
  if(old30.length){
    const oldVal = getWeightInUnit(old30[old30.length-1].value, old30[old30.length-1].unit, state.weightUnit);
    const diff = latest - oldVal;
    const el = document.getElementById("wChange");
    el.textContent = (diff>=0?"+":"")+diff.toFixed(1);
    el.style.color = diff<=0?"var(--color-success)":"var(--color-error)";
  } else {
    document.getElementById("wChange").textContent="—";
  }
}

function getChartData() {
  let log = [...state.weightLog].sort((a,b)=>a.date.localeCompare(b.date));
  if(activeRange>0){
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-activeRange);
    log=log.filter(e=>new Date(e.date)>=cutoff);
  }
  return {
    labels: log.map(e=>e.date.slice(5)),
    data: log.map(e=>+getWeightInUnit(e.value,e.unit,state.weightUnit).toFixed(2)),
  };
}

function renderWeightChart() {
  const isDark=document.documentElement.getAttribute("data-theme")==="dark";
  const gridColor=isDark?"rgba(255,255,255,0.06)":"rgba(0,0,0,0.06)";
  const textColor=isDark?"#797876":"#7a7974";
  const {labels,data}=getChartData();
  const ctx=document.getElementById("weightChart").getContext("2d");

  if(weightChart){weightChart.destroy();}
  if(!data.length){
    ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
    const emptyEl=document.querySelector(".chart-wrap");
    emptyEl.innerHTML=`<canvas id="weightChart"></canvas><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><p style="font-size:var(--text-sm);color:var(--color-text-faint)">No data yet — log your first weight above</p></div>`;
    return;
  }

  // Gradient fill
  const gradient=ctx.createLinearGradient(0,0,0,240);
  gradient.addColorStop(0,isDark?"rgba(79,152,163,0.25)":"rgba(1,105,111,0.15)");
  gradient.addColorStop(1,isDark?"rgba(79,152,163,0)":"rgba(1,105,111,0)");

  weightChart=new Chart(ctx,{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:`Weight (${state.weightUnit})`,
        data,
        borderColor:isDark?"#4f98a3":"#01696f",
        borderWidth:2,
        pointRadius:data.length>60?0:3,
        pointHoverRadius:5,
        pointBackgroundColor:isDark?"#4f98a3":"#01696f",
        fill:true,
        backgroundColor:gradient,
        tension:0.35,
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:{duration:600,easing:"easeInOutQuart"},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:isDark?"#1c1b19":"#fff",
          titleColor:isDark?"#cdccca":"#28251d",
          bodyColor:isDark?"#797876":"#7a7974",
          borderColor:isDark?"#393836":"#d4d1ca",
          borderWidth:1,
          padding:10,
          callbacks:{label:ctx=>`${ctx.parsed.y.toFixed(1)} ${state.weightUnit}`}
        }
      },
      scales:{
        x:{grid:{color:gridColor},ticks:{color:textColor,font:{family:"'DM Mono',monospace",size:11},maxTicksLimit:8},border:{color:gridColor}},
        y:{grid:{color:gridColor},ticks:{color:textColor,font:{family:"'DM Mono',monospace",size:11},callback:v=>`${v} ${state.weightUnit}`},border:{color:gridColor}}
      }
    }
  });
}

function renderWeightLog() {
  const el=document.getElementById("weightLogList");
  const sorted=[...state.weightLog].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
  if(!sorted.length){el.innerHTML=`<p style="font-size:var(--text-sm);color:var(--color-text-faint);padding:var(--space-4) 0">No entries yet.</p>`;return;}
  el.innerHTML=sorted.map((e,i,arr)=>{
    const val=getWeightInUnit(e.value,e.unit,state.weightUnit);
    const prevRaw=arr[i+1];
    let delta="";
    if(prevRaw){
      const prev=getWeightInUnit(prevRaw.value,prevRaw.unit,state.weightUnit);
      const diff=val-prev;
      const cls=diff<0?"down":diff>0?"up":"same";
      delta=`<span class="wlog-delta ${cls}">${diff>=0?"+":""}${diff.toFixed(1)}</span>`;
    }
    return`<div class="weight-log-item"><span class="wlog-date">${e.date.slice(5)}</span><span class="wlog-val">${val.toFixed(1)} ${state.weightUnit}</span>${delta}<button class="icon-btn delete" data-wdel="${e.date}" aria-label="Delete entry"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button></div>`;
  }).join("");
  el.querySelectorAll("[data-wdel]").forEach(btn=>btn.addEventListener("click",()=>{
    state.weightLog=state.weightLog.filter(e=>e.date!==btn.dataset.wdel);
    saveState();renderWeight();
  }));
}

const MEAL_DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
const MEAL_COLS = ["Breakfast","Lunch","Dinner","Snack"];

if (!state.mealWeeks) state.mealWeeks = {}; // { "weekLabel": [{Day,Breakfast,Lunch,Dinner,Snack}] }
let activeMealWeek = null;

function getMealWeekLabel(dateStr) {
  // Returns "2026-W20" style label from a Monday date string
  const d = new Date(dateStr + "T00:00:00");
  const jan4 = new Date(d.getFullYear(), 0, 4);
  const week = Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
  return d.getFullYear() + "-W" + String(week).padStart(2,"0");
}

function currentWeekLabel() {
  const d = new Date();
  const day = d.getDay(); // 0=Sun
  const diff = d.getDate() - day + (day===0?-6:1); // Monday
  const mon = new Date(d.setDate(diff));
  return getMealWeekLabel(mon.toISOString().slice(0,10));
}

// CSV parsing
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/).filter(l=>l.trim());
  if (lines.length < 2) return null;
  const headers = lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  const dayIdx = headers.findIndex(h=>h.toLowerCase()==="day");
  if (dayIdx === -1) return { error: "CSV must have a 'Day' column." };
  const rows = lines.slice(1).map(line=>{
    // Handle quoted commas
    const cells = []; let cur="", inQ=false;
    for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;}else if(c===","&&!inQ){cells.push(cur.trim().replace(/^"|"$/g,""));cur="";}else{cur+=c;}}
    cells.push(cur.trim().replace(/^"|"$/g,""));
    const obj={};
    headers.forEach((h,i)=>{ obj[h]=cells[i]||""; });
    return obj;
  }).filter(r=>r.Day?.trim());
  // Validate at least one meal day
  const validDays = rows.filter(r=>MEAL_DAYS.some(d=>r.Day.trim()===d||r.Day.trim().toLowerCase()===d.toLowerCase()));
  if(!validDays.length) return {error:"No valid days found. Use: Monday, Tuesday, Wednesday, Thursday, Friday"};
  // Normalise day names
  validDays.forEach(r=>{ const m=MEAL_DAYS.find(d=>d.toLowerCase()===r.Day.trim().toLowerCase()); if(m)r.Day=m; });
  return {rows:validDays};
}

function handleCSVFile(file) {
  const errEl = document.getElementById("importError");
  errEl.textContent = "";
  if (!file || !file.name.endsWith(".csv")) { errEl.textContent = "Please upload a .csv file."; return; }
  const reader = new FileReader();
  reader.onload = e => {
    const result = parseCSV(e.target.result);
    if (!result) { errEl.textContent = "Could not parse CSV — make sure it has headers."; return; }
    if (result.error) { errEl.textContent = result.error; return; }
    // Determine week label from today or filename
    const weekLabel = currentWeekLabel();
    // Allow multiple weeks — use filename date hint if present
    const fnMatch = file.name.match(/(\d{4}-W\d{2})/);
    const label = fnMatch ? fnMatch[1] : weekLabel;
    if (!state.mealWeeks) state.mealWeeks = {};
    state.mealWeeks[label] = result.rows;
    activeMealWeek = label;
    saveState();
    // Navigate to meal-plan page after import
    document.querySelectorAll(".nav-item[data-page]").forEach(b=>b.classList.remove("active"));
    document.querySelector('[data-page="meal-plan"]')?.classList.add("active");
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById("page-meal-plan")?.classList.add("active");
    document.getElementById("topbarTitle").textContent="Meal Plan";
    document.getElementById("mobileTitle").textContent="Meal Plan";
    renderMeals();
  };
  reader.readAsText(file);
}

function getShopState(week) {
  if (!state.shoppingLists) state.shoppingLists = {};
  if (!state.shoppingLists[week]) state.shoppingLists[week] = { auto: [], manual: [] };
  return state.shoppingLists[week];
}

function extractIngredients(rows) {
  // Returns [{label, source}] from Ingredients column, semicolon-separated
  const items = [];
  const seen = new Set();
  rows.forEach(r => {
    const raw = r["Ingredients"] || r["ingredients"] || "";
    if (!raw.trim()) return;
    raw.split(";").map(s=>s.trim()).filter(Boolean).forEach(ing => {
      const key = ing.toLowerCase();
      if (!seen.has(key)) { seen.add(key); items.push({ label: ing, source: r.Day?.slice(0,3) || "" }); }
    });
  });
  return items;
}

function syncAutoItems(week) {
  const shop = getShopState(week);
  const rows = state.mealWeeks[week] || [];
  const fresh = extractIngredients(rows);
  // Preserve checked state for existing auto items
  const checkedMap = {};
  shop.auto.forEach(i => { checkedMap[i.label.toLowerCase()] = i.checked; });
  shop.auto = fresh.map((f,idx) => ({
    id: "auto_" + idx,
    label: f.label,
    source: f.source,
    checked: checkedMap[f.label.toLowerCase()] || false,
  }));
  saveState();
}

function renderShoppingList() {
  if (!activeMealWeek || !state.mealWeeks[activeMealWeek]) {
    document.getElementById("shopList").innerHTML = `<p style="font-size:var(--text-sm);color:var(--color-text-faint);padding:var(--space-4) 0">No week imported yet. Go to Import CSV first.</p>`;
    document.getElementById("shopProgressBar").style.width="0%";
    return;
  }
  syncAutoItems(activeMealWeek);
  const shop = getShopState(activeMealWeek);
  const all = [...shop.auto, ...shop.manual];
  const total = all.length, done = all.filter(i=>i.checked).length;
  document.getElementById("shopProgressBar").style.width = total ? (done/total*100)+"%" : "0%";

  const listEl = document.getElementById("shopList");
  if (!all.length) { listEl.innerHTML = `<p style="font-size:var(--text-sm);color:var(--color-text-faint);padding:var(--space-2) 0">No ingredients found. Add an Ingredients column to your CSV, or add items manually.</p>`; return; }

  let html = "";
  if (shop.auto.length) {
    html += `<div class="shop-group-label">From meal plan</div>`;
    html += shop.auto.map(item => `
      <div class="shop-item${item.checked?" checked":""}" data-id="${item.id}" data-type="auto">
        <div class="shop-checkbox${item.checked?" checked":""}" data-check="${item.id}" data-type="auto">
          ${item.checked?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>`:""}
        </div>
        <span class="shop-label">${item.label}</span>
        ${item.source?`<span class="shop-source">${item.source}</span>`:""}
      </div>`).join("");
  }
  if (shop.manual.length) {
    html += `<div class="shop-group-label">Added manually</div>`;
    html += shop.manual.map(item => `
      <div class="shop-item${item.checked?" checked":""}" data-id="${item.id}" data-type="manual">
        <div class="shop-checkbox${item.checked?" checked":""}" data-check="${item.id}" data-type="manual">
          ${item.checked?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>`:""}
        </div>
        <span class="shop-label">${item.label}</span>
        <button class="icon-btn delete" data-shopDel="${item.id}" aria-label="Delete">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div>`).join("");
  }
  listEl.innerHTML = html;

  // Checkbox toggle
  listEl.querySelectorAll("[data-check]").forEach(cb => {
    cb.addEventListener("click", () => {
      const id = cb.dataset.check, type = cb.dataset.type;
      const shop2 = getShopState(activeMealWeek);
      const arr = type==="auto" ? shop2.auto : shop2.manual;
      const item = arr.find(i=>i.id===id);
      if (item) item.checked = !item.checked;
      saveState(); renderShoppingList();
    });
  });

  // Delete manual
  listEl.querySelectorAll("[data-shopDel]").forEach(btn => {
    btn.addEventListener("click", () => {
      const shop2 = getShopState(activeMealWeek);
      shop2.manual = shop2.manual.filter(i=>i.id!==btn.dataset.shopDel);
      saveState(); renderShoppingList();
    });
  });
}

  shop.auto = shop.auto.filter(i=>!i.checked);
  shop.manual = shop.manual.filter(i=>!i.checked);
  saveState(); renderShoppingList();
});


// Shopping week tabs (for shopping page)
function renderShoppingWeekTabs() {
  const el = document.getElementById("shoppingWeekTabs");
  if (!el) return;
  const weeks = Object.keys(state.mealWeeks||{}).sort().reverse();
  if (!weeks.length) { el.innerHTML=""; return; }
  if (!activeMealWeek || !state.mealWeeks[activeMealWeek]) activeMealWeek = weeks[0];
  el.innerHTML = `<div class="week-tabs-row" style="margin-bottom:var(--space-4)">${weeks.map(w=>`
    <div class="meal-week-tab${w===activeMealWeek?" active":""}" data-week="${w}">
      ${w}
    </div>`).join("")}</div>`;
  el.querySelectorAll(".meal-week-tab").forEach(tab=>{
    tab.addEventListener("click",()=>{ activeMealWeek=tab.dataset.week; renderShoppingWeekTabs(); renderShoppingList(); });
  });
}

// Import history — show all imported weeks on the import page
function renderImportHistory() {
  const el = document.getElementById("importHistory");
  if (!el) return;
  const weeks = Object.keys(state.mealWeeks||{}).sort().reverse();
  if (!weeks.length) { el.innerHTML=`<p style="font-size:var(--text-sm);color:var(--color-text-faint)">No weeks imported yet.</p>`; return; }
  el.innerHTML = `<div class="section-header"><span class="section-title">Imported Weeks</span></div>`
    + weeks.map(w=>{
      const rows = state.mealWeeks[w]||[];
      return `<div class="task-item" style="justify-content:space-between">
        <div class="task-info">
          <div class="task-name">${w}</div>
          <div class="task-duration">${rows.length} days imported</div>
        </div>
        <button class="icon-btn delete" data-delweek="${w}" aria-label="Delete week">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        </button>
      </div>`;
    }).join("");
  el.querySelectorAll("[data-delweek]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      delete state.mealWeeks[btn.dataset.delweek];
      if(activeMealWeek===btn.dataset.delweek) activeMealWeek=null;
      saveState(); renderImportHistory();
    });
  });
}

// After CSV import, navigate to meal-plan page

renderChores();
